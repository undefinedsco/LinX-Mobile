name: LinXApple
options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
packages:
  AppAuthPackage:
    url: https://github.com/openid/AppAuth-iOS
    exactVersion: 2.0.0
  ExyteChatPackage:
    url: https://github.com/exyte/Chat
    exactVersion: 3.0.2
  MarkdownViewPackage:
    url: https://github.com/LiYanan2004/MarkdownView
    exactVersion: 2.6.1
targets:
  LinXApple:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LinXApple/Sources
      - path: LinXApple/Resources
        buildPhase: resources
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.undefineds.linx.apple
        PRODUCT_NAME: LinXApple
        INFOPLIST_FILE: LinXApple/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: AppAuthPackage
        product: AppAuth
      - package: ExyteChatPackage
        product: ExyteChat
      - package: MarkdownViewPackage
        product: MarkdownView
    scheme:
      testTargets:
        - LinXAppleTests
        - LinXAppleUITests
  LinXAppleTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LinXAppleTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.undefineds.linx.apple.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LinXApple
      - package: AppAuthPackage
        product: AppAuth
  LinXAppleUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LinXAppleUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.undefineds.linx.apple.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: LinXApple
    dependencies:
      - target: LinXApple
