name: Android Pgyer Release

on:
  push:
    tags:
      - "**"
  workflow_run:
    workflows:
      - Android Build and Test
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      version_name:
        description: "Android versionName. Leave empty to read package.json version."
        required: false
        type: string
      version_code:
        description: "Android versionCode. Leave empty to use this workflow run number."
        required: false
        type: string

concurrency:
  group: android-pgyer-release
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  pgyer-release:
    name: Build and Upload LinXMobile Android to Pgyer
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    env:
      CI: "true"
      PGYER_API_KEY: ${{ secrets.PGYER_API_KEY }}
      ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEYSTORE_TYPE: ${{ secrets.ANDROID_KEYSTORE_TYPE }}
      VERSION_NAME_INPUT: ${{ github.event.inputs.version_name }}
      VERSION_CODE_INPUT: ${{ github.event.inputs.version_code }}

    steps:
      - name: Checkout workflow run commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout current ref
        if: github.event_name != 'workflow_run'
        uses: actions/checkout@v4

      - name: Wait for Android Build and Test
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          TAG_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            run_json="$(
              gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow "Android Build and Test" \
                --branch "$TAG_NAME" \
                --commit "$TAG_SHA" \
                --event push \
                --limit 5 \
                --json databaseId,status,conclusion,url \
                --jq '.[0] // empty'
            )"

            if [ -n "$run_json" ]; then
              status="$(printf '%s' "$run_json" | node -e 'let data = ""; process.stdin.on("data", chunk => data += chunk); process.stdin.on("end", () => console.log(JSON.parse(data).status || ""));')"
              conclusion="$(printf '%s' "$run_json" | node -e 'let data = ""; process.stdin.on("data", chunk => data += chunk); process.stdin.on("end", () => console.log(JSON.parse(data).conclusion || ""));')"
              run_url="$(printf '%s' "$run_json" | node -e 'let data = ""; process.stdin.on("data", chunk => data += chunk); process.stdin.on("end", () => console.log(JSON.parse(data).url || ""));')"

              if [ "$status" = "completed" ]; then
                if [ "$conclusion" = "success" ]; then
                  echo "ANDROID_BUILD_TEST_RUN_URL=$run_url" >> "$GITHUB_ENV"
                  echo "Android Build and Test succeeded: $run_url"
                  exit 0
                fi
                echo "error: Android Build and Test completed with conclusion '$conclusion': $run_url" >&2
                exit 1
              fi
            fi

            echo "Waiting for Android Build and Test for tag $TAG_NAME ($attempt/120)..."
            sleep 30
          done

          echo "error: timed out waiting for Android Build and Test for tag $TAG_NAME" >&2
          exit 1

      - name: Validate release environment
        run: |
          set -euo pipefail
          : "${PGYER_API_KEY:?PGYER_API_KEY secret is required}"
          : "${ANDROID_RELEASE_KEYSTORE_BASE64:?ANDROID_RELEASE_KEYSTORE_BASE64 secret is required}"
          : "${ANDROID_KEYSTORE_PASSWORD:?ANDROID_KEYSTORE_PASSWORD secret is required}"
          : "${ANDROID_KEY_ALIAS:?ANDROID_KEY_ALIAS secret is required}"
          : "${ANDROID_KEY_PASSWORD:?ANDROID_KEY_PASSWORD secret is required}"
          : "${ANDROID_KEYSTORE_TYPE:?ANDROID_KEYSTORE_TYPE secret is required}"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK packages
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006"

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Resolve release metadata
        run: |
          set -euo pipefail

          if [ -n "${VERSION_NAME_INPUT:-}" ]; then
            version_name="$VERSION_NAME_INPUT"
          else
            version_name="$(node -p "require('./package.json').version")"
          fi
          if [ -z "$version_name" ]; then
            echo "error: Android versionName is empty" >&2
            exit 1
          fi

          if [ -n "${VERSION_CODE_INPUT:-}" ]; then
            version_code="$VERSION_CODE_INPUT"
          else
            version_code="$GITHUB_RUN_NUMBER"
          fi
          if ! [[ "$version_code" =~ ^[1-9][0-9]*$ ]]; then
            echo "error: Android versionCode must be a positive integer" >&2
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            release_branch="${{ github.event.workflow_run.head_branch }}"
            release_commit="${{ github.event.workflow_run.head_sha }}"
            source_run_url="${{ github.event.workflow_run.html_url }}"
          else
            release_branch="$GITHUB_REF_NAME"
            release_commit="$GITHUB_SHA"
            source_run_url="${ANDROID_BUILD_TEST_RUN_URL:-$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID}"
          fi

          {
            echo "ANDROID_VERSION_NAME=$version_name"
            echo "ANDROID_VERSION_CODE=$version_code"
            echo "RELEASE_BRANCH=$release_branch"
            echo "RELEASE_COMMIT_SHA=$release_commit"
            echo "SOURCE_RUN_URL=$source_run_url"
          } >> "$GITHUB_ENV"

      - name: Decode release keystore
        run: |
          set -euo pipefail
          mkdir -p android/app/signing
          keystore_path="$PWD/android/app/signing/release.keystore"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Build signed release APK
        run: |
          set -euo pipefail
          cd android
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Locate release APK
        run: |
          set -euo pipefail
          apk_path="$(find android/app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | sort | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "error: release APK not found" >&2
            exit 1
          fi
          echo "APK_PATH=$apk_path" >> "$GITHUB_ENV"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: linxmobile-android-release-apk
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload APK to Pgyer
        uses: PGYER/pgyer-upload-app-action@v1.3
        with:
          _api_key: ${{ secrets.PGYER_API_KEY }}
          appFilePath: ${{ env.APK_PATH }}
          buildInstallType: "1"
          buildUpdateDescription: |
            LinXMobile Android ${{ env.ANDROID_VERSION_NAME }} (${{ env.ANDROID_VERSION_CODE }})
            Branch: ${{ env.RELEASE_BRANCH }}
            Commit: ${{ env.RELEASE_COMMIT_SHA }}
            Source run: ${{ env.SOURCE_RUN_URL }}
            Release run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Upload release diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linxmobile-android-release-diagnostics
          path: |
            android/app/build/outputs/logs/**
            android/app/build/reports/**
            android/app/build/test-results/**
          if-no-files-found: ignore
          retention-days: 14
